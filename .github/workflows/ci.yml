name: CI

# Push and pull-request gates for asmt.
#
# Design: build, test, and lint are HARD gates. They only fail when the
# code is actually broken, so the CI badge stays a meaningful signal of
# "the code on main compiles, passes tests, and is lint-clean".
#
# govulncheck is a SOFT gate (continue-on-error). It depends on a live
# vulnerability database, so a brand-new stdlib CVE disclosed at 02:00
# UTC can turn CI red overnight even when no human touched the repo.
# We still run it on every push so contributors see the findings in the
# job log, but we do NOT fail the workflow on its output. A separate
# nightly workflow (.github/workflows/vulncheck.yml) runs the same
# check on a schedule against the latest stable Go and emails the
# maintainer on failure, which is the right channel for "you should
# bump Go".
#
# Why pin Go to 1.25 here instead of "stable":
# golangci-lint's bundled go/parser is built against a specific Go
# version and lags ~1-2 weeks behind every Go major release. Using
# "stable" turns CI red in that window because the linter cannot parse
# the new stdlib. Pin to a Go minor version that golangci-lint has
# already shipped support for. setup-go's "1.25" string still resolves
# to the latest 1.25.x patch, so within-line stdlib CVE fixes are
# picked up automatically. Bump to "1.26" in a one-line PR once
# golangci-lint catches up.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # "stable" tracks the latest released Go. This auto-pulls every
          # patch release the moment it ships, so we get stdlib CVE fixes
          # within hours of disclosure without a manual bump.
          go-version: "1.25"
          cache: true

      - name: Verify module checksums
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Build (race)
        run: go build -race ./...

      - name: Vet
        run: go vet ./...

      - name: Test (race)
        run: go test -race -short ./...

  vulncheck:
    name: govulncheck (advisory)
    runs-on: ubuntu-latest
    # Soft gate: surface findings in the job log on every push, but never
    # block a merge or turn the badge red. The nightly vulncheck.yml
    # workflow handles real notification.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
