server:
  # Binds to localhost only by default (safe). Use "0.0.0.0:8080" to expose externally.
  address: "127.0.0.1:8080"

# Language for UI and messages: "en" (English) or "ko" (Korean)
language: "en"

check_interval: "30s"

checks:
  loadbalancer:
    enabled: true
    lb_ip: ""            # Set to your GCP LB external IP to verify full path

  linux:
    enabled: true
    disk_warn: 80        # Warn when disk usage exceeds 80%
    disk_critical: 90    # Critical when disk usage exceeds 90%
    mem_warn: 85
    mem_critical: 95

  firewall:
    enabled: true
    ports: [80, 443, 3306]

  # HTTP server: supports nginx and Apache
  # type: "auto" (detect), "nginx", or "apache"
  http_server:
    enabled: true
    type: "auto"
    pid_file: ""         # Leave empty for auto-detection

  phpfpm:
    enabled: true
    socket: ""           # Leave empty for auto-detection across distros
    port: 0              # Set to e.g. 9000 if using TCP instead of socket

  mariadb:
    enabled: true
    dsn: "${MARIADB_DSN}"

  wordpress:
    enabled: true
    url: "http://localhost"
    expect_body: "</html>"
    tls_skip_verify: false  # Set true only for self-signed certs

# Log watcher: tails log files and matches known error patterns.
# Auto-detects log files across Debian, RHEL, Arch, Alpine, and SUSE.
logs:
  enabled: true
  buffer_size: 200
  files: []              # Leave empty for auto-detection

healthz:
  critical_checks: ["nginx", "apache", "phpfpm", "mariadb"]

alerts:
  log:
    enabled: true
  webhook:
    enabled: false
    url: "${WEBHOOK_URL}"
  email:
    enabled: false
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    from: "monitor@example.com"
    to: ["admin@example.com"]
    username: "${SMTP_USERNAME}"
    password: "${SMTP_PASSWORD}"
