# 한국어 번역 - Server-Stat
# 새로운 언어를 추가하려면 이 파일을 복사하여 모든 값을 번역하세요.
# 파일 이름은 언어 코드와 일치해야 합니다 (예: ja.yaml, de.yaml).
# %s, %d, %.2f 같은 형식 지정자는 번역된 문자열에 그대로 유지해야 합니다.

status:
  ok: "정상"
  warn: "경고"
  critical: "심각"
  unknown: "알 수 없음"
  healthy: "정상"
  unhealthy: "비정상"

dashboard:
  title: "ASMT - 또 다른 서버 모니터링 도구"
  last_updated: "마지막 업데이트"
  loading: "상태 데이터 로드 중..."
  no_checks: "설정된 점검 항목 없음"
  fetch_error: "상태 가져오기 실패"

components:
  loadbalancer: "로드 밸런서"
  linux: "리눅스 OS"
  firewall: "방화벽"
  nginx: "Nginx"
  apache: "Apache"
  phpfpm: "PHP-FPM"
  mariadb: "MariaDB"
  wordpress: "WordPress"
  redis: "Redis"
  postgresql: "PostgreSQL"

