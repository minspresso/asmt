<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server-Stat Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1117;
    color: #e1e4e8;
    padding: 20px;
    min-height: 100vh;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid #21262d;
  }
  .header h1 { font-size: 24px; font-weight: 600; }
  .overall-badge {
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .status-ok { background: #0d4429; color: #3fb950; }
  .status-warn { background: #4a3000; color: #d29922; }
  .status-critical { background: #5a1a1a; color: #f85149; }
  .status-unknown { background: #2d2d2d; color: #8b949e; }
  .meta { color: #8b949e; font-size: 13px; margin-bottom: 24px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 16px;
  }
  .card {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 8px;
    padding: 16px;
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .card-title {
    font-size: 16px;
    font-weight: 600;
    text-transform: capitalize;
  }
  .card-status {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    display: inline-block;
  }
  .dot-ok { background: #3fb950; box-shadow: 0 0 8px #3fb95066; }
  .dot-warn { background: #d29922; box-shadow: 0 0 8px #d2992266; }
  .dot-critical { background: #f85149; box-shadow: 0 0 8px #f8514966; animation: pulse 2s infinite; }
  .dot-unknown { background: #8b949e; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .check-item {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 8px 0;
    border-top: 1px solid #21262d;
    font-size: 13px;
  }
  .check-name { color: #8b949e; min-width: 140px; }
  .check-message { flex: 1; text-align: right; }
  .check-message.msg-ok { color: #3fb950; }
  .check-message.msg-warn { color: #d29922; }
  .check-message.msg-critical { color: #f85149; }
  .check-message.msg-unknown { color: #8b949e; }
  .check-duration { color: #484f58; font-size: 11px; margin-left: 8px; min-width: 50px; text-align: right; }
  .loading { text-align: center; padding: 40px; color: #8b949e; }
  .error-banner {
    background: #5a1a1a;
    border: 1px solid #f85149;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 16px;
    color: #f85149;
    display: none;
  }
</style>
</head>
<body>
  <div class="header">
    <h1>Server-Stat</h1>
    <span id="overall" class="overall-badge status-unknown">Loading...</span>
  </div>
  <div id="error" class="error-banner"></div>
  <div class="meta">Last updated: <span id="lastUpdate">-</span></div>
  <div id="grid" class="grid">
    <div class="loading">Loading status data...</div>
  </div>

<script>
const COMPONENT_ORDER = ['loadbalancer', 'linux', 'firewall', 'nginx', 'phpfpm', 'mariadb', 'wordpress'];
const DISPLAY_NAMES = {
  loadbalancer: 'Load Balancer',
  linux: 'Linux OS',
  firewall: 'Firewall',
  nginx: 'Nginx',
  phpfpm: 'PHP-FPM',
  mariadb: 'MariaDB',
  wordpress: 'WordPress'
};

function worstStatus(checks) {
  const priority = { critical: 3, warn: 2, unknown: 1, ok: 0 };
  let worst = 'ok';
  for (const c of checks) {
    if ((priority[c.status] || 0) > (priority[worst] || 0)) {
      worst = c.status;
    }
  }
  return worst;
}

function renderCard(name, checks) {
  const worst = worstStatus(checks);
  let html = `<div class="card">
    <div class="card-header">
      <span class="card-title">${DISPLAY_NAMES[name] || name}</span>
      <span class="card-status dot-${worst}"></span>
    </div>`;

  for (const check of checks) {
    html += `<div class="check-item">
      <span class="check-name">${check.component}</span>
      <span class="check-message msg-${check.status}">${escapeHtml(check.message)}</span>
      <span class="check-duration">${check.duration}</span>
    </div>`;
  }
  html += '</div>';
  return html;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function fetchStatus() {
  try {
    const resp = await fetch('/api/status');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    document.getElementById('error').style.display = 'none';

    const overall = document.getElementById('overall');
    overall.textContent = data.overall.toUpperCase();
    overall.className = `overall-badge status-${data.overall}`;

    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();

    const grid = document.getElementById('grid');
    let html = '';

    for (const name of COMPONENT_ORDER) {
      if (data.components[name]) {
        html += renderCard(name, data.components[name]);
      }
    }
    // Render any components not in the predefined order
    for (const name of Object.keys(data.components)) {
      if (!COMPONENT_ORDER.includes(name)) {
        html += renderCard(name, data.components[name]);
      }
    }

    grid.innerHTML = html || '<div class="loading">No checks configured</div>';
  } catch (err) {
    const errorEl = document.getElementById('error');
    errorEl.textContent = 'Failed to fetch status: ' + err.message;
    errorEl.style.display = 'block';
  }
}

fetchStatus();
setInterval(fetchStatus, 5000);
</script>
</body>
</html>
