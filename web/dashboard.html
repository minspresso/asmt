<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server-Stat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1117;
    color: #e1e4e8;
    padding: 20px;
    min-height: 100vh;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid #21262d;
  }
  .header h1 { font-size: 24px; font-weight: 600; }
  .overall-badge {
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .status-ok { background: #0d4429; color: #3fb950; }
  .status-warn { background: #4a3000; color: #d29922; }
  .status-critical { background: #5a1a1a; color: #f85149; }
  .status-unknown { background: #2d2d2d; color: #8b949e; }
  .meta { color: #8b949e; font-size: 13px; margin-bottom: 24px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 16px;
  }
  .card {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 8px;
    padding: 16px;
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .card-title {
    font-size: 16px;
    font-weight: 600;
  }
  .card-status {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    display: inline-block;
  }
  .dot-ok { background: #3fb950; box-shadow: 0 0 8px #3fb95066; }
  .dot-warn { background: #d29922; box-shadow: 0 0 8px #d2992266; }
  .dot-critical { background: #f85149; box-shadow: 0 0 8px #f8514966; animation: pulse 2s infinite; }
  .dot-unknown { background: #8b949e; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .check-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-top: 1px solid #21262d;
    font-size: 13px;
    gap: 8px;
  }
  .check-name { color: #8b949e; white-space: nowrap; flex-shrink: 0; }
  .check-message { flex: 1; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .check-message.msg-ok { color: #3fb950; }
  .check-message.msg-warn { color: #d29922; }
  .check-message.msg-critical { color: #f85149; }
  .check-message.msg-unknown { color: #8b949e; }
  .check-duration { color: #484f58; font-size: 11px; white-space: nowrap; flex-shrink: 0; }
  .loading { text-align: center; padding: 40px; color: #8b949e; }
  .logs-section {
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid #21262d;
  }
  .logs-section h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .logs-empty { color: #8b949e; font-size: 13px; padding: 16px 0; }
  .log-entry {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 8px;
  }
  .log-entry-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .log-title { font-weight: 600; font-size: 14px; }
  .log-title.sev-error { color: #f85149; }
  .log-title.sev-warn { color: #d29922; }
  .log-title.sev-info { color: #8b949e; }
  .log-source {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: #21262d;
    color: #8b949e;
  }
  .log-line {
    font-family: 'SFMono-Regular', Consolas, monospace;
    font-size: 12px;
    color: #8b949e;
    word-break: break-all;
    margin: 6px 0;
    padding: 6px 8px;
    background: #0d1117;
    border-radius: 4px;
    max-height: 60px;
    overflow: hidden;
  }
  .log-mitigation {
    font-size: 13px;
    color: #58a6ff;
    padding: 6px 0 0 0;
    border-top: 1px solid #21262d;
    margin-top: 6px;
  }
  .log-time { font-size: 11px; color: #484f58; }
  .error-banner {
    background: #5a1a1a;
    border: 1px solid #f85149;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 16px;
    color: #f85149;
    display: none;
  }
  .history-bar {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid #21262d;
  }
  .history-label {
    font-size: 11px;
    color: #484f58;
    margin-bottom: 5px;
  }
  .history-days {
    display: flex;
    gap: 3px;
  }
  .history-day {
    flex: 1;
    height: 18px;
    border-radius: 3px;
    cursor: default;
    transition: opacity 0.15s;
    position: relative;
  }
  .history-day:hover { opacity: 0.75; }
  .hday-ok       { background: #3fb950; }
  .hday-warn     { background: #d29922; }
  .hday-critical { background: #f85149; }
  .hday-unknown  { background: #21262d; }
  .metrics-section {
    margin-top: 24px;
    padding: 16px;
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 8px;
  }
  .metrics-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .metrics-title { font-size: 16px; font-weight: 600; }
  .metrics-legend {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: #8b949e;
  }
  .legend-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }
  .metrics-refresh {
    background: none;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #8b949e;
    font-size: 12px;
    padding: 4px 10px;
    cursor: pointer;
  }
  .metrics-refresh:hover { border-color: #58a6ff; color: #58a6ff; }
  .metrics-svg-wrap {
    width: 100%;
    overflow: hidden;
    border-radius: 4px;
    background: #0d1117;
  }
  .metrics-svg-wrap svg { display: block; width: 100%; height: 90px; }
  .metrics-empty { color: #8b949e; font-size: 13px; padding: 20px 0; text-align: center; }
  .metrics-range { font-size: 11px; color: #484f58; margin-top: 6px; text-align: right; }
</style>
</head>
<body>
  <div class="header">
    <h1 id="title">Server-Stat</h1>
    <span id="overall" class="overall-badge status-unknown">...</span>
  </div>
  <div id="error" class="error-banner"></div>
  <div class="meta"><span id="lastUpdateLabel">Last updated</span>: <span id="lastUpdate">-</span></div>
  <div id="grid" class="grid">
    <div class="loading" id="loadingText">Loading status data...</div>
  </div>
  <div class="metrics-section" id="metricsSection" style="display:none">
    <div class="metrics-header">
      <span class="metrics-title">Resource Usage (7 days)</span>
      <div style="display:flex;align-items:center;gap:12px">
        <div class="metrics-legend">
          <span><span class="legend-dot" style="background:#58a6ff"></span>Memory %</span>
          <span><span class="legend-dot" style="background:#3fb950"></span>Load %</span>
        </div>
        <button class="metrics-refresh" id="metricsRefresh" onclick="fetchMetrics()">&#8635; Refresh</button>
      </div>
    </div>
    <div class="metrics-svg-wrap" id="metricsSvgWrap">
      <div class="metrics-empty" id="metricsEmpty">No data yet — check back after the first interval.</div>
    </div>
    <div class="metrics-range" id="metricsRange"></div>
  </div>

  <div class="logs-section">
    <h2 id="logsTitle">Log Warnings</h2>
    <div id="logsContainer" class="logs-empty">No warnings detected in logs</div>
  </div>

<script>
const COMPONENT_ORDER = ['loadbalancer', 'linux', 'firewall', 'nginx', 'apache', 'phpfpm', 'mariadb', 'wordpress', 'ssl'];

// i18n strings (loaded from /api/i18n, with English fallbacks)
let i18n = {
  dashboard: {
    title: 'Server-Stat',
    last_updated: 'Last updated',
    loading: 'Loading status data...',
    no_checks: 'No checks configured',
    fetch_error: 'Failed to fetch status'
  },
  components: {
    loadbalancer: 'Load Balancer',
    linux: 'Linux OS',
    firewall: 'Firewall',
    nginx: 'Nginx',
    phpfpm: 'PHP-FPM',
    mariadb: 'MariaDB',
    wordpress: 'WordPress',
    ssl: 'SSL Certificates'
  },
  status: {
    ok: 'OK',
    warn: 'Warning',
    critical: 'Critical',
    unknown: 'Unknown'
  },
  logs: {
    logs_title: 'Log Warnings',
    logs_empty: 'No warnings detected in logs',
    logs_mitigation: 'Mitigation'
  }
};

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function worstStatus(checks) {
  const priority = { critical: 3, warn: 2, unknown: 1, ok: 0 };
  let worst = 'ok';
  for (const c of checks) {
    if ((priority[c.status] || 0) > (priority[worst] || 0)) {
      worst = c.status;
    }
  }
  return worst;
}

function statusLabel(status) {
  return i18n.status[status] || status.toUpperCase();
}

function renderHistoryBar(checks, history) {
  // Collect all component names for this card, look up their history days
  const componentNames = checks.map(c => c.component);
  // Merge: for each day slot, take the worst status across all components in this card
  let merged = null;
  for (const name of componentNames) {
    const days = history[name];
    if (!days) continue;
    if (!merged) {
      merged = days.map(d => ({ ...d }));
    } else {
      for (let i = 0; i < merged.length; i++) {
        const priority = { critical: 3, warn: 2, ok: 1, unknown: 0 };
        if ((priority[days[i].status] || 0) > (priority[merged[i].status] || 0)) {
          merged[i].status = days[i].status;
        }
      }
    }
  }
  if (!merged) return '';

  const dayLabels = { ok: 'OK', warn: 'Warning', critical: 'Critical', unknown: 'No data' };
  let bars = merged.map(d => {
    const safeStatus = escapeHtml(d.status);
    const label = escapeHtml(d.date + ': ' + (dayLabels[d.status] || d.status));
    return `<div class="history-day hday-${safeStatus}" title="${label}"></div>`;
  }).join('');

  return `<div class="history-bar">
    <div class="history-label">7-day history</div>
    <div class="history-days">${bars}</div>
  </div>`;
}

function renderCard(name, checks, history) {
  const worst = worstStatus(checks);
  const displayName = escapeHtml(i18n.components[name] || name);
  let html = `<div class="card">
    <div class="card-header">
      <span class="card-title">${displayName}</span>
      <span class="card-status dot-${escapeHtml(worst)}"></span>
    </div>`;

  for (const check of checks) {
    const safeStatus = escapeHtml(check.status);
    html += `<div class="check-item">
      <span class="check-name">${escapeHtml(check.component)}</span>
      <span class="check-message msg-${safeStatus}">${escapeHtml(check.message)}</span>
      <span class="check-duration">${escapeHtml(check.duration)}</span>
    </div>`;
  }

  html += renderHistoryBar(checks, history || {});
  html += '</div>';
  return html;
}

async function loadI18n() {
  try {
    const resp = await fetch('/api/i18n');
    if (resp.ok) {
      const data = await resp.json();
      if (data.dashboard) i18n.dashboard = { ...i18n.dashboard, ...data.dashboard };
      if (data.components) i18n.components = { ...i18n.components, ...data.components };
      if (data.status) i18n.status = { ...i18n.status, ...data.status };
      if (data.logs) i18n.logs = { ...i18n.logs, ...data.logs };
      if (data.lang) document.documentElement.lang = data.lang;
    }
  } catch (e) {
    // Fallback to English defaults silently
  }
  // Apply i18n to static elements
  document.getElementById('title').textContent = i18n.dashboard.title;
  document.getElementById('lastUpdateLabel').textContent = i18n.dashboard.last_updated;
  document.getElementById('loadingText').textContent = i18n.dashboard.loading;
  document.getElementById('logsTitle').textContent = i18n.logs.logs_title;
  document.title = i18n.dashboard.title;
}

function renderLogEntry(entry) {
  const safeSev = escapeHtml(entry.severity);
  return `<div class="log-entry">
    <div class="log-entry-header">
      <span class="log-title sev-${safeSev}">${escapeHtml(entry.title)}</span>
      <span class="log-source">${escapeHtml(entry.source)}</span>
    </div>
    <div class="log-line">${escapeHtml(entry.line)}</div>
    <div class="log-mitigation">${escapeHtml(entry.mitigation)}</div>
    <div class="log-time">${new Date(entry.timestamp).toLocaleString()}</div>
  </div>`;
}

async function fetchLogs() {
  try {
    const resp = await fetch('/api/logs');
    if (!resp.ok) return;
    const data = await resp.json();
    const container = document.getElementById('logsContainer');

    if (!data.entries || data.entries.length === 0) {
      container.className = 'logs-empty';
      container.innerHTML = escapeHtml(i18n.logs.logs_empty);
      return;
    }

    container.className = '';
    // Show up to 50 most recent entries in the dashboard
    const entries = data.entries.slice(0, 50);
    container.innerHTML = entries.map(renderLogEntry).join('');
  } catch (e) {
    // Silently ignore log fetch errors
  }
}

async function fetchStatus() {
  try {
    const resp = await fetch('/api/status');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    document.getElementById('error').style.display = 'none';

    const overall = document.getElementById('overall');
    overall.textContent = statusLabel(data.overall);
    overall.className = `overall-badge status-${data.overall}`;

    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();

    const grid = document.getElementById('grid');
    let html = '';

    const history = data.history || {};
    for (const name of COMPONENT_ORDER) {
      if (data.components[name]) {
        html += renderCard(name, data.components[name], history);
      }
    }
    for (const name of Object.keys(data.components)) {
      if (!COMPONENT_ORDER.includes(name)) {
        html += renderCard(name, data.components[name], history);
      }
    }

    grid.innerHTML = html || `<div class="loading">${escapeHtml(i18n.dashboard.no_checks)}</div>`;
  } catch (err) {
    const errorEl = document.getElementById('error');
    errorEl.textContent = i18n.dashboard.fetch_error + ': ' + err.message;
    errorEl.style.display = 'block';
  }
}

function buildSparkline(points, numCPUs) {
  if (!points || points.length === 0) return null;

  const W = 800, H = 90, PAD = 2;
  const inner = H - PAD * 2;

  function toY(pct) {
    const clamped = Math.min(100, Math.max(0, pct));
    return PAD + inner * (1 - clamped / 100);
  }

  function buildPath(values) {
    if (values.length === 0) return '';
    const step = W / (values.length - 1 || 1);
    return values.map((v, i) => {
      const x = (values.length === 1 ? W / 2 : i * step).toFixed(1);
      const y = toY(v).toFixed(1);
      return (i === 0 ? 'M' : 'L') + x + ',' + y;
    }).join(' ');
  }

  const memPcts  = points.map(p => p.m);
  const loadPcts = points.map(p => Math.min(100, (p.l / numCPUs) * 100));

  const memPath  = buildPath(memPcts);
  const loadPath = buildPath(loadPcts);

  // Area fill paths (close down to bottom)
  function buildArea(values) {
    if (values.length === 0) return '';
    const step = W / (values.length - 1 || 1);
    const pts = values.map((v, i) => {
      const x = (values.length === 1 ? W / 2 : i * step).toFixed(1);
      return x + ',' + toY(v).toFixed(1);
    });
    const lastX = (values.length === 1 ? W / 2 : (values.length - 1) * step).toFixed(1);
    return 'M' + pts.join(' L') + ` L${lastX},${H} L0,${H} Z`;
  }

  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="${buildArea(memPcts)}"  fill="#58a6ff" fill-opacity="0.08"/>
    <path d="${buildArea(loadPcts)}" fill="#3fb950" fill-opacity="0.08"/>
    <path d="${memPath}"  fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="${loadPath}" fill="none" stroke="#3fb950" stroke-width="1.5" stroke-linejoin="round"/>
  </svg>`;
}

async function fetchMetrics() {
  const btn = document.getElementById('metricsRefresh');
  if (btn) btn.textContent = '⟳ Loading…';
  try {
    const resp = await fetch('/api/metrics');
    if (!resp.ok) return;
    const data = await resp.json();
    const points = data.points || [];
    const numCPUs = data.num_cpus || 1;

    const section = document.getElementById('metricsSection');
    section.style.display = '';

    const wrap  = document.getElementById('metricsSvgWrap');
    const empty = document.getElementById('metricsEmpty');
    const range = document.getElementById('metricsRange');

    if (points.length === 0) {
      wrap.innerHTML = '<div class="metrics-empty">No data yet — check back after the first interval.</div>';
      range.textContent = '';
      return;
    }

    const svg = buildSparkline(points, numCPUs);
    wrap.innerHTML = svg || '';

    const oldest = new Date(points[0].t * 1000);
    const newest = new Date(points[points.length - 1].t * 1000);
    range.textContent = oldest.toLocaleString() + ' → ' + newest.toLocaleString() + ' (' + points.length + ' readings)';
  } catch (e) {
    // Silently ignore
  } finally {
    if (btn) btn.textContent = '↻ Refresh';
  }
}

// Load translations first, then start polling
loadI18n().then(() => {
  fetchStatus();
  fetchLogs();
  fetchMetrics();
  setInterval(fetchStatus, 5000);
  setInterval(fetchLogs, 10000);
});
</script>
</body>
</html>
